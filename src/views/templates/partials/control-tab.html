<!-- 控制状态 Tab -->

<!-- 代理控制卡片 -->
<div class="card" style="margin-bottom:12px">
    <div class="card-head">代理控制</div>
    <!-- 端口配置 -->
    <div style="margin-bottom:10px">
        <div class="fg">
            <label>Hybrid 端口</label>
            <input type="number" id="cfgHybridPort" value="{{hybridPort}}" placeholder="3006" min="1" max="65535">
        </div>
        <div class="fg" style="margin-bottom:0">
            <label>Inference 端口</label>
            <input type="number" id="cfgInferencePort" value="{{inferencePort}}" placeholder="3001" min="1" max="65535">
        </div>
    </div>

    <!-- 控制按钮 -->
    <div class="btns" style="margin-bottom:10px" id="proxyControlButtons">
        {{proxyControlButtons}}
        <button type="button" class="btn btn-s sm" data-ws-action="clearCache">清理缓存</button>
        <button type="button" class="btn btn-s sm" id="checkForUpdatesBtn" data-ws-action="checkForUpdates" title="从 GitHub 检查更新">检查更新</button>
    </div>

    <!-- 账号模式 -->
    <div class="row between" style="padding:2px 0 8px">
        <div class="row" style="gap:6px;align-items:center">
            <span style="font-size:11px;color:{{inputFgColor}}">账号模式</span>
            <span id="accountModeBadge" class="badge" style="font-size:10px;padding:1px 6px">未选择</span>
        </div>
        <button type="button" class="btn btn-s sm" data-ws-action="switchAccountMode" style="font-size:10px;padding:2px 8px">切换</button>
    </div>

    <!-- 自动启动 -->
    <div class="row between" style="padding:2px 0">
        <div class="row">
            <span style="font-size:11px;color:{{inputFgColor}}">自动启动</span>
            <label class="tog"><input type="checkbox" id="cfgAutoStartProxy" {{autoStartChecked}}><span></span></label>
        </div>
    </div>
</div>

<!-- 补丁植入卡片 -->
<div class="card" style="margin-bottom:12px">
    <div class="card-head between">
        <span>补丁植入</span>
        <span id="patchModalBadge" class="badge {{patchBadgeClass}}">{{patchBadgeText}}</span>
    </div>
    <input type="hidden" id="patchApiUrl" value="{{patchApiUrl}}">
    <input type="hidden" id="patchInferenceUrl" value="{{patchInferenceUrl}}">
    <div id="patchPathDisplay" class="patch-path">{{patchPathDisplay}}</div>
    <div class="btns" style="margin-bottom:8px">
        <button type="button" class="btn btn-s sm" data-ws-action="locateExtJs">选择路径</button>
        <button type="button" class="btn btn-s sm" data-ws-action="clearExtJsPath">自动检测</button>
        <button type="button" class="btn btn-s sm" data-ws-action="refreshPatchStatus">刷新状态</button>
    </div>
    <div class="btns" id="patchActionButtons" style="margin-bottom:8px">
        <button type="button" class="btn btn-p sm" data-ws-action="applyPatch">安装补丁</button>
        <button type="button" class="btn btn-s sm" data-ws-action="revertPatch">还原</button>
    </div>
    <div id="patchActionState" class="action-state hidden">
        <div id="patchActionText" class="action-text"></div>
        <div class="action-progress"><div class="action-progress-bar"></div></div>
    </div>
</div>

<!-- 运行状态统计卡 -->
<div class="card" style="margin-bottom:0">
    <div class="card-head" id="proxyStatusTitle">运行状态</div>
    <div class="stats">
        <div class="st"><b id="statPort">{{statPort}}</b><small>端口</small></div>
        <div class="st"><b id="statUptime">{{statUptime}}</b><small>时长</small></div>
        <div class="st"><b id="statRequests">{{statRequests}}</b><small>请求</small></div>
    </div>
</div>

<!-- 代理日志 -->
<div class="card" style="margin-top:12px;margin-bottom:0">
    <div class="card-head between">
        <span>代理日志</span>
        <div class="row" style="gap:4px">
            <button type="button" class="btn btn-s sm" data-ws-action="clearLogs" style="font-size:10px;padding:3px 6px">清空</button>
            <button type="button" class="btn btn-s sm" data-ws-action="toggleLogPause" style="font-size:10px;padding:3px 6px" id="logPauseBtn">暂停</button>
            <button type="button" class="btn btn-s sm" data-ws-action="copyLogs" style="font-size:10px;padding:3px 6px">复制</button>
        </div>
    </div>
    <div id="logBody">
        <div class="log-box" id="logBox" style="max-height:300px">{{logContent}}</div>
        <div id="copyToast" class="copy-toast hidden">已复制</div>
    </div>
</div>

<!-- 更新弹窗 -->
<div id="updateModal" class="modal-mask" style="display:none">
    <div class="modal-body" style="max-width:420px">
        <div class="modal-head">
            <span id="updateModalTitle">发现新版本</span>
            <button type="button" class="btn-icon" id="btnCloseUpdateModal">×</button>
        </div>
        <div id="updateModalBody" style="padding:4px 0;font-size:12px;line-height:1.6"></div>
        <div id="updateModalBtns" class="btns" style="margin-top:10px"></div>
    </div>
</div>

<!-- 账号模式弹窗 -->
<div id="accountModeModal" class="modal-mask" style="display:none">
    <div class="modal-body" style="max-width:380px">
        <div class="modal-head">
            <span id="accountModeModalTitle">选择账号类型</span>
            <button type="button" class="btn-icon" id="btnCloseAccountModeModal">×</button>
        </div>
        <div id="accountModeModalBody" style="padding:4px 0;font-size:12px;line-height:1.6"></div>
        <div id="accountModeModalBtns" class="btns" style="margin-top:10px"></div>
    </div>
</div>
